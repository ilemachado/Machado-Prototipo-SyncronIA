<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useLayoutEffect } = React;

/* ─── Auto-scaling stage: scales 1280×730 native to fit container width ─── */
function ScaledStage({ children, width = 1280, height = 730 }) {
  const outerRef = useRef();
  const [scale, setScale] = useState(1);

  useLayoutEffect(() => {
    const calc = () => {
      const el = outerRef.current;
      if (!el) return;
      const w = el.clientWidth;
      setScale(Math.min(1, w / width));
    };
    calc();
    const ro = new ResizeObserver(calc);
    if (outerRef.current) ro.observe(outerRef.current);
    window.addEventListener('resize', calc);
    return () => { ro.disconnect(); window.removeEventListener('resize', calc); };
  }, [width]);

  return (
    <div
      ref={outerRef}
      className="flow-section-stage"
      style={{ height: height * scale }}
    >
      <div
        className="flow-section-stage-inner"
        style={{
          width,
          height,
          transform: `scale(${scale})`,
        }}
      >
        {children}
      </div>
    </div>
  );
}

          y se bifurca (Decidí por mí · Detalle · Voz) y la
          <b style={{ color: 'var(--t1)', fontWeight: 600 }}> sesión</b> sigue hasta el cierre
          con continuidad inteligente.
        </p>
        <div className="page-meta">

          <span><b style={{ color: 'var(--neon)' }}>02</b> Inicio · bifurcación</span>
          <span className="leg-arrow">→</span>
          <span><b style={{ color: 'var(--neon)' }}>03</b> Sesión · continuidad · cierre</span>
        </div>

      </footer>
    </div>
  );
}

</script>
